name: Documentation Improvement
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!
  - type: textarea
    id: location
    attributes:
      label: Documentation Location
      description: Which document or page needs improvement?
      placeholder: e.g., README.md, docs/configuration.md, or epicode.cn/docs
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What needs improvement?
      description: Describe what's unclear, missing, or incorrect.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: If you have a suggestion for how to improve it, please describe it here.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
