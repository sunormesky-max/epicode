name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: First interaction
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to Epicode! 🎉
            
            Thank you for opening your first issue. We appreciate your feedback and will review it soon.
            
            If you haven't already, please check our [Contributing Guide](CONTRIBUTING.md) and [Code of Conduct](CODE_OF_CONDUCT.md).
          pr-message: |
            Welcome to Epicode! 🎉
            
            Thank you for your first pull request. We appreciate your contribution!
            
            Please make sure you've read our [Contributing Guide](CONTRIBUTING.md) and that all CI checks pass.
