services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.cloud
    environment:
      RUST_LOG: info
      TETRAMEM_LISTEN_ADDR: 0.0.0.0:9111
      TETRAMEM_ADMIN_KEY: ${TETRAMEM_ADMIN_KEY}
      TETRAMEM_MASTER_KEY: ${TETRAMEM_MASTER_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - backend-data:/app/data
    ports:
      - "9111:9111"
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend-data:
