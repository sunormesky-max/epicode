apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: epicode
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  EPICODE_ADMIN_KEY: {{ .Values.env.EPICODE_ADMIN_KEY | required "env.EPICODE_ADMIN_KEY is required" | quote }}
  EPICODE_MASTER_KEY: {{ .Values.env.EPICODE_MASTER_KEY | required "env.EPICODE_MASTER_KEY is required" | quote }}
  {{- if .Values.env.DEEPSEEK_API_KEY }}
  DEEPSEEK_API_KEY: {{ .Values.env.DEEPSEEK_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.REDIS_URL }}
  REDIS_URL: {{ .Values.env.REDIS_URL | quote }}
  {{- end }}
