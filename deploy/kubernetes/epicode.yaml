apiVersion: v1
kind: Namespace
metadata:
  name: epicode
---
apiVersion: v1
kind: Secret
metadata:
  name: epicode-secrets
  namespace: epicode
type: Opaque
stringData:
  DEEPSEEK_API_KEY: replace-me
  TETRAMEM_ADMIN_KEY: replace-me
  TETRAMEM_MASTER_KEY: ""
  REDIS_URL: redis://epicode-redis:6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: epicode-backend-data
  namespace: epicode
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epicode-redis
  namespace: epicode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epicode-redis
  template:
    metadata:
      labels:
        app: epicode-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: epicode-redis
  namespace: epicode
spec:
  selector:
    app: epicode-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epicode-backend
  namespace: epicode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epicode-backend
  template:
    metadata:
      labels:
        app: epicode-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/sunormesky-max/epicode-backend:latest
          ports:
            - containerPort: 9111
          env:
            - name: RUST_LOG
              value: info
            - name: TETRAMEM_LISTEN_ADDR
              value: 0.0.0.0:9111
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: epicode-secrets
                  key: DEEPSEEK_API_KEY
            - name: TETRAMEM_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: epicode-secrets
                  key: TETRAMEM_ADMIN_KEY
            - name: TETRAMEM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: epicode-secrets
                  key: TETRAMEM_MASTER_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: epicode-secrets
                  key: REDIS_URL
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: epicode-backend-data
---
apiVersion: v1
kind: Service
metadata:
  name: epicode-backend
  namespace: epicode
spec:
  selector:
    app: epicode-backend
  ports:
    - port: 9111
      targetPort: 9111
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epicode-frontend
  namespace: epicode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epicode-frontend
  template:
    metadata:
      labels:
        app: epicode-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sunormesky-max/epicode-frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: epicode-frontend
  namespace: epicode
spec:
  selector:
    app: epicode-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epicode
  namespace: epicode
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
spec:
  ingressClassName: nginx
  rules:
    - host: epicode.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: epicode-backend
                port:
                  number: 9111
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: epicode-backend
                port:
                  number: 9111
          - path: /openapi.yaml
            pathType: Prefix
            backend:
              service:
                name: epicode-backend
                port:
                  number: 9111
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: epicode-backend
                port:
                  number: 9111
          - path: /
            pathType: Prefix
            backend:
              service:
                name: epicode-frontend
                port:
                  number: 3000
