server {
    listen 80;
    server_name _;

    # API routes — must come before the catch-all frontend route.
    # Public API prefix is /api/v1. Nginx strips /api and forwards the
    # remaining /v1/... path to the backend. The backend serves /v1 directly.
    location /api/ {
        proxy_pass http://backend:9111/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location = /health {
        proxy_pass http://backend:9111/health;
    }

    # Public stats endpoint
    location = /stats/public {
        proxy_pass http://backend:9111/stats/public;
    }

    # OpenAPI documentation
    location = /docs {
        proxy_pass http://backend:9111/docs;
    }

    location = /openapi.yaml {
        proxy_pass http://backend:9111/openapi.yaml;
    }

    # Frontend SPA — catch-all, must be last
    location / {
        proxy_pass http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
